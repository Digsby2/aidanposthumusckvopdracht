<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Coin Escape - Muziek Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 18px;
      margin-bottom: 6px;
    }

    p {
      margin-top: 4px;
      color: #d1d5db;
    }

    #game {
      background: #1f2937;
      border: 3px solid #60a5fa;
      border-radius: 12px;
      margin-top: 15px;
    }

    .controls {
      margin-top: 12px;
    }

    button {
      padding: 10px 16px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .info {
      margin: 12px auto;
      max-width: 650px;
      font-size: 14px;
      color: #e5e7eb;
    }
  </style>
</head>
<body>
  <h1>Coin Escape</h1>
  <p>Onderzoek: maakt muziek een game spannender?</p>

  <canvas id="game" width="640" height="400"></canvas>

  <div class="controls">
    <button onclick="startGame(true)">Start met geluid</button>
    <button onclick="startGame(false)">Start zonder geluid</button>
    <button onclick="resetGame()">Opnieuw</button>
  </div>

  <div class="info">
    Besturing: gebruik de pijltjestoetsen of WASD. Verzamel zoveel mogelijk munten en ontwijk de rode vijand.
    Test dit spel één keer met geluid en één keer zonder geluid.
  </div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let keys = {};
let score = 0;
let gameOver = false;
let soundOn = false;
let audioCtx = null;
let musicOsc = null;
let musicGain = null;

let player = { x: 70, y: 190, size: 24, speed: 4 };
let coin = { x: 350, y: 180, size: 18 };
let enemy = { x: 540, y: 190, size: 28, speed: 1.35 };

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function startAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  stopMusic();

  musicOsc = audioCtx.createOscillator();
  musicGain = audioCtx.createGain();

  musicOsc.type = "sawtooth";
  musicOsc.frequency.value = 110;
  musicGain.gain.value = 0.035;

  musicOsc.connect(musicGain);
  musicGain.connect(audioCtx.destination);
  musicOsc.start();
}

function stopMusic() {
  if (musicOsc) {
    try { musicOsc.stop(); } catch(e) {}
    musicOsc = null;
  }
}

function beep(freq, duration, volume) {
  if (!soundOn) return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "square";
  osc.frequency.value = freq;
  gain.gain.value = volume;

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();

  setTimeout(() => {
    osc.stop();
  }, duration);
}

function startGame(useSound) {
  soundOn = useSound;
  resetGame();

  if (soundOn) {
    startAudio();
  } else {
    stopMusic();
  }
}

function resetGame() {
  score = 0;
  gameOver = false;

  player.x = 70;
  player.y = 190;
  enemy.x = 540;
  enemy.y = 190;
  randomCoin();

  if (!soundOn) stopMusic();
}

function randomCoin() {
  coin.x = Math.random() * (canvas.width - 60) + 30;
  coin.y = Math.random() * (canvas.height - 60) + 30;
}

function movePlayer() {
  if (keys["arrowright"] || keys["d"]) player.x += player.speed;
  if (keys["arrowleft"] || keys["a"]) player.x -= player.speed;
  if (keys["arrowup"] || keys["w"]) player.y -= player.speed;
  if (keys["arrowdown"] || keys["s"]) player.y += player.speed;

  player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
  player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));
}

function moveEnemy() {
  let dx = player.x - enemy.x;
  let dy = player.y - enemy.y;
  let distance = Math.sqrt(dx * dx + dy * dy);

  if (distance > 0) {
    enemy.x += (dx / distance) * enemy.speed;
    enemy.y += (dy / distance) * enemy.speed;
  }
}

function touching(a, b) {
  return (
    a.x < b.x + b.size &&
    a.x + a.size > b.x &&
    a.y < b.y + b.size &&
    a.y + a.size > b.y
  );
}

function update() {
  if (!gameOver) {
    movePlayer();
    moveEnemy();

    if (touching(player, coin)) {
      score++;
      beep(700, 90, 0.08);
      randomCoin();
      enemy.speed += 0.06;
    }

    if (touching(player, enemy)) {
      gameOver = true;
      beep(120, 400, 0.12);
      stopMusic();
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // background grid
  ctx.strokeStyle = "#374151";
  for (let x = 0; x < canvas.width; x += 40) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += 40) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  // coin
  ctx.fillStyle = "#facc15";
  ctx.beginPath();
  ctx.arc(coin.x + coin.size / 2, coin.y + coin.size / 2, coin.size / 2, 0, Math.PI * 2);
  ctx.fill();

  // enemy
  ctx.fillStyle = "#ef4444";
  ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);

  // player
  ctx.fillStyle = "#60a5fa";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // text
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 20, 30);
  ctx.fillText("Geluid: " + (soundOn ? "aan" : "uit"), 500, 30);

  if (gameOver) {
    ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "36px Arial";
    ctx.fillText("Game Over", 225, 180);

    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 285, 220);
    ctx.fillText("Klik op Opnieuw of start een andere versie.", 160, 260);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

draw();
loop();
</script>
</body>
</html>
