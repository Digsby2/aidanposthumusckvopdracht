<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Aidan Posthumus - CKV Opdracht Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: "Comic Sans MS", Arial, sans-serif;
      background: #202020;
      color: white;
      text-align: center;
    }
    h1 {
      margin-top: 20px;
      margin-bottom: 2px;
      font-size: 28px;
      font-weight: normal;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
      font-weight: normal;
      color: #dddddd;
    }
    #game {
      background: #2b2b2b;
      border: 4px dashed white;
      margin-top: 15px;
    }
    button {
      padding: 9px 15px;
      margin: 8px 4px;
      border: 2px solid white;
      background: #444;
      color: white;
      font-size: 15px;
      cursor: pointer;
      font-family: "Comic Sans MS", Arial, sans-serif;
    }
    button:hover { background: #666; }
  </style>
</head>
<body>
  <h1>Aidan Posthumus - CKV Opdracht Game</h1>
  <h2>Coin Escape</h2>

  <canvas id="game" width="640" height="400"></canvas>

  <div>
    <button onclick="startGame(true)">Start met geluid</button>
    <button onclick="startGame(false)">Start zonder geluid</button>
    <button onclick="resetGame()">Opnieuw</button>
  </div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let keys = {};
let score = 0;
let gameOver = false;
let soundOn = false;
let audioCtx = null;
let musicOsc = null;
let musicGain = null;

let player = { x: 70, y: 190, size: 24, speed: 4 };
let coin = { x: 350, y: 180, size: 18 };
let enemy = { x: 540, y: 190, size: 28, speed: 1.35 };

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function startAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  stopMusic();
  musicOsc = audioCtx.createOscillator();
  musicGain = audioCtx.createGain();
  musicOsc.type = "sawtooth";
  musicOsc.frequency.value = 115;
  musicGain.gain.value = 0.035;
  musicOsc.connect(musicGain);
  musicGain.connect(audioCtx.destination);
  musicOsc.start();
}

function stopMusic() {
  if (musicOsc) {
    try { musicOsc.stop(); } catch(e) {}
    musicOsc = null;
  }
}

function beep(freq, duration, volume) {
  if (!soundOn) return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "square";
  osc.frequency.value = freq;
  gain.gain.value = volume;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  setTimeout(() => { osc.stop(); }, duration);
}

function startGame(useSound) {
  soundOn = useSound;
  resetGame();
  if (soundOn) startAudio();
  else stopMusic();
}

function resetGame() {
  score = 0;
  gameOver = false;
  player.x = 70;
  player.y = 190;
  enemy.x = 540;
  enemy.y = 190;
  enemy.speed = 1.35;
  randomCoin();
  if (!soundOn) stopMusic();
}

function randomCoin() {
  coin.x = Math.random() * (canvas.width - 60) + 30;
  coin.y = Math.random() * (canvas.height - 60) + 30;
}

function movePlayer() {
  if (keys["arrowright"] || keys["d"]) player.x += player.speed;
  if (keys["arrowleft"] || keys["a"]) player.x -= player.speed;
  if (keys["arrowup"] || keys["w"]) player.y -= player.speed;
  if (keys["arrowdown"] || keys["s"]) player.y += player.speed;
  player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
  player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));
}

function moveEnemy() {
  let dx = player.x - enemy.x;
  let dy = player.y - enemy.y;
  let distance = Math.sqrt(dx * dx + dy * dy);
  if (distance > 0) {
    enemy.x += (dx / distance) * enemy.speed;
    enemy.y += (dy / distance) * enemy.speed;
  }
}

function touching(a, b) {
  return (
    a.x < b.x + b.size &&
    a.x + a.size > b.x &&
    a.y < b.y + b.size &&
    a.y + a.size > b.y
  );
}

function update() {
  if (!gameOver) {
    movePlayer();
    moveEnemy();
    if (touching(player, coin)) {
      score++;
      beep(700, 90, 0.08);
      randomCoin();
      enemy.speed += 0.06;
    }
    if (touching(player, enemy)) {
      gameOver = true;
      beep(120, 400, 0.12);
      stopMusic();
    }
  }
}

function drawHomemadeGrid() {
  ctx.strokeStyle = "#3b3b3b";
  ctx.lineWidth = 1;
  for (let x = 0; x < canvas.width; x += 50) {
    ctx.beginPath();
    ctx.moveTo(x + Math.random() * 2, 0);
    ctx.lineTo(x + Math.random() * 2, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += 50) {
    ctx.beginPath();
    ctx.moveTo(0, y + Math.random() * 2);
    ctx.lineTo(canvas.width, y + Math.random() * 2);
    ctx.stroke();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawHomemadeGrid();

  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(coin.x + coin.size / 2, coin.y + coin.size / 2, coin.size / 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = "orange";
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.fillStyle = "red";
  ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
  ctx.fillStyle = "white";
  ctx.fillRect(enemy.x + 6, enemy.y + 6, 5, 5);
  ctx.fillRect(enemy.x + 17, enemy.y + 6, 5, 5);

  ctx.fillStyle = "deepskyblue";
  ctx.fillRect(player.x, player.y, player.size, player.size);
  ctx.fillStyle = "black";
  ctx.fillRect(player.x + 6, player.y + 7, 4, 4);
  ctx.fillRect(player.x + 15, player.y + 7, 4, 4);

  ctx.fillStyle = "white";
  ctx.font = "20px Comic Sans MS";
  ctx.fillText("Score: " + score, 20, 30);
  ctx.fillText("Geluid: " + (soundOn ? "aan" : "uit"), 500, 30);
  ctx.font = "14px Comic Sans MS";
  ctx.fillText("Aidan Posthumus", 20, 380);

  if (gameOver) {
    ctx.fillStyle = "rgba(0, 0, 0, 0.70)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.font = "36px Comic Sans MS";
    ctx.fillText("Game Over", 225, 180);
    ctx.font = "20px Comic Sans MS";
    ctx.fillText("Score: " + score, 285, 220);
    ctx.fillText("Klik op opnieuw", 245, 260);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

draw();
loop();
</script>
</body>
</html>
